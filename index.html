<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#3b82f6" />
  <title>AR Card</title>
  <link rel="icon" href="data:," />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #ar-container { position: fixed; inset: 0; }
    #ar-container canvas, #ar-container video { display: block; }
    #intro {
      position: fixed; inset: 0; z-index: 10;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
    }
    #intro h1 { font-size: 26px; margin: 0 0 8px; font-weight: 700; }
    #intro p { font-size: 15px; line-height: 1.6; opacity: 0.9; margin: 4px 0; max-width: 320px; }
    #intro button {
      margin-top: 28px;
      padding: 16px 28px; font-size: 17px; font-weight: 600;
      background: #fff; color: #1e3a8a; border: 0; border-radius: 999px;
      box-shadow: 0 10px 30px rgba(255,255,255,0.15);
      cursor: pointer;
    }
    #intro .hint { margin-top: 18px; font-size: 12px; opacity: 0.6; }
    #intro .heart { font-size: 36px; margin-bottom: 12px; animation: bounce 1.4s infinite ease-in-out; }
    @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    #loading {
      position: fixed; inset: 0; z-index: 9;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center; background: rgba(10,14,28,0.92);
    }
    #loading .ring {
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      animation: spin 0.9s linear infinite; margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .msg { font-size: 14px; opacity: 0.85; }
    #loading .pct { font-size: 12px; opacity: 0.6; margin-top: 6px; }
    #hint-overlay {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 8;
      padding: 10px 16px; background: rgba(0,0,0,0.55); border-radius: 999px;
      font-size: 13px; backdrop-filter: blur(8px);
      display: none;
    }
    #err {
      position: fixed; inset: 0; z-index: 20; padding: 24px;
      background: #7f1d1d; color: #fff; display: none;
      align-items: center; justify-content: center; text-align: center;
    }
    #err pre { white-space: pre-wrap; font-size: 12px; opacity: 0.85; }
    #debug {
      position: fixed; top: 8px; right: 8px; z-index: 25;
      background: rgba(0,0,0,0.75); color: #34d399;
      font-family: monospace; font-size: 10px; line-height: 1.4;
      padding: 6px 8px; border-radius: 6px; max-width: 60vw;
      max-height: 40vh; overflow: auto; white-space: pre-wrap;
      pointer-events: none;
    }
    #gate {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
    }
    #gate h2 { font-size: 22px; margin: 0 0 6px; font-weight: 700; }
    #gate .sub { font-size: 14px; opacity: 0.8; margin: 0 0 24px; max-width: 300px; line-height: 1.5; }
    #gate .pin-row { display: flex; gap: 10px; }
    #gate input.pin {
      width: 56px; height: 64px; font-size: 28px; text-align: center;
      border: 2px solid rgba(255,255,255,0.25); border-radius: 12px;
      background: rgba(255,255,255,0.08); color: #fff; outline: none;
      font-family: monospace;
    }
    #gate input.pin:focus { border-color: #fff; background: rgba(255,255,255,0.15); }
    #gate .err-toast { color: #fda4af; font-size: 13px; margin-top: 18px; min-height: 18px; }
    #gate .lock { font-size: 36px; margin-bottom: 14px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
</head>
<body>
  <div id="gate">
    <div class="lock">🔒</div>
    <h2>PIN을 입력해주세요</h2>
    <p class="sub">카드에 적힌 4자리 PIN을 입력하면<br/>AR 카드가 시작됩니다.</p>
    <div class="pin-row">
      <input class="pin" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0" />
      <input class="pin" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1" />
      <input class="pin" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2" />
      <input class="pin" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3" />
    </div>
    <div class="err-toast" id="pin-err"></div>
  </div>

  <div id="intro">
    <div class="heart">💖</div>
    <h1>AR 카드</h1>
    <p>카드를 비추면 메시지가 떠올라요.</p>
    <p style="opacity:0.7">처음 한 번만 5~10초 준비 시간이 필요합니다.</p>
    <button id="start">시작하기</button>
    <p class="hint">카메라 권한을 허용해주세요</p>
  </div>

  <div id="loading">
    <div class="ring"></div>
    <div class="msg">카드 인식 준비 중…</div>
    <div class="pct" id="pct">0%</div>
  </div>

  <div id="hint-overlay">📷 카드를 펼친 채로 카메라에 비춰주세요</div>

  <div id="err"><div><h3>오류</h3><pre id="errMsg"></pre></div></div>
  <div id="debug">debug ready</div>
  <div id="ar-container"></div>

  <script>
    const PIN_HASH = "e2709bf43e5a064b64ed6d315926b596e29c735fc1af2c681a9c6fe8d4e20812";
    const PIN_SESSION_KEY = "ar-pin-ok";
    const TRIGGER_IMGS = ["assets/t-a.jpg", "assets/t-b.jpg", "assets/t-c.jpg"];
    const HERO_IMG = "assets/hero.jpg";
    const CACHE_KEY = "ar-multi-target-v3";
    const TARGET_COLORS = ["#fda4af", "#fb7185", "#c084fc"];

    const dbgEl = document.getElementById("debug");
    const dbgLines = [];
    const log = (m) => {
      console.log("[ar]", m);
      const t = new Date().toISOString().slice(11, 19);
      dbgLines.push(`${t} ${m}`);
      if (dbgLines.length > 20) dbgLines.shift();
      if (dbgEl) dbgEl.textContent = dbgLines.join("\n");
    };
    window.addEventListener("error", (e) => log(`[err] ${e.message || e.error}`));
    window.addEventListener("unhandledrejection", (e) => log(`[rej] ${e.reason?.message || e.reason}`));
    log(`ua: ${navigator.userAgent.slice(0, 50)}`);
    log(`secure: ${window.isSecureContext}`);
    log(`mediaDevices: ${!!navigator.mediaDevices?.getUserMedia}`);
    log(`MINDAR keys: ${Object.keys(window.MINDAR || {}).join(",")}`);
    if (window.MINDAR?.IMAGE) {
      log(`MINDAR.IMAGE keys: ${Object.keys(window.MINDAR.IMAGE).slice(0, 8).join(",")}`);
    }

    async function sha256Hex(s) {
      const buf = new TextEncoder().encode(s);
      const hash = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function showIntro() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("intro").style.display = "flex";
    }

    async function tryPin(pin) {
      const h = await sha256Hex(`haneul-${pin}-2026`);
      log(`pin try → match=${h === PIN_HASH}`);
      if (h === PIN_HASH) {
        try { sessionStorage.setItem(PIN_SESSION_KEY, "1"); } catch (_) {}
        showIntro();
        return true;
      }
      return false;
    }

    function setupGate() {
      if (sessionStorage.getItem(PIN_SESSION_KEY) === "1") { showIntro(); return; }
      const inputs = Array.from(document.querySelectorAll("#gate input.pin"));
      const errEl = document.getElementById("pin-err");
      inputs[0].focus();
      inputs.forEach((el, i) => {
        el.addEventListener("input", async () => {
          el.value = el.value.replace(/\D/g, "");
          if (el.value && i < inputs.length - 1) inputs[i + 1].focus();
          if (inputs.every(x => x.value.length === 1)) {
            const pin = inputs.map(x => x.value).join("");
            errEl.textContent = "확인 중…";
            const ok = await tryPin(pin);
            if (!ok) {
              errEl.textContent = "PIN이 맞지 않아요. 카드를 다시 확인해주세요.";
              inputs.forEach(x => x.value = "");
              inputs[0].focus();
            }
          }
        });
        el.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !el.value && i > 0) inputs[i - 1].focus();
        });
      });
    }
    setupGate();

    const setPct = (n) => { document.getElementById("pct").textContent = `${n.toFixed(0)}%`; };
    const setLoadingMsg = (m) => { document.querySelector("#loading .msg").textContent = m; };
    const showErr = (e) => {
      document.getElementById("err").style.display = "flex";
      document.getElementById("errMsg").textContent = (e && e.stack) ? e.stack : String(e);
      console.error(e);
    };

    async function loadImage(src) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = src;
      await new Promise((r, j) => { img.onload = r; img.onerror = j; });
      return img;
    }

    async function loadOrCompileTargets() {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          log("cache hit");
          const arr = Uint8Array.from(atob(cached), c => c.charCodeAt(0));
          return URL.createObjectURL(new Blob([arr.buffer]));
        }
      } catch (_) {}

      setLoadingMsg("카드 3장 정보를 학습 중이에요…");
      const imgs = await Promise.all(TRIGGER_IMGS.map(loadImage));
      imgs.forEach((img, i) => log(`trigger ${i}: ${img.naturalWidth}x${img.naturalHeight}`));

      if (!window.MINDAR || !window.MINDAR.IMAGE) {
        throw new Error("MINDAR.IMAGE not loaded");
      }
      log(`MINDAR.IMAGE keys: ${Object.keys(window.MINDAR.IMAGE).slice(0, 6).join(",")}`);
      const compiler = new window.MINDAR.IMAGE.Compiler();
      await compiler.compileImageTargets(imgs, (p) => setPct(p));
      const exported = await compiler.exportData();
      log(`compiled ${exported.byteLength}b`);

      try {
        let b64 = "";
        const bytes = new Uint8Array(exported);
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          b64 += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        localStorage.setItem(CACHE_KEY, btoa(b64));
      } catch (e) { log("cache skip: " + e.message); }

      return URL.createObjectURL(new Blob([exported]));
    }

    document.getElementById("start").addEventListener("click", async () => {
      try {
        log("start clicked");
        document.getElementById("intro").style.display = "none";
        document.getElementById("loading").style.display = "flex";
        const targetUrl = await loadOrCompileTargets();
        log("targets ready");

        const { MindARThree } = window.MINDAR.IMAGE;
        const THREE = window.MINDAR.IMAGE.THREE;
        log(`THREE: ${!!THREE} MindARThree: ${!!MindARThree}`);

        const mindar = new MindARThree({
          container: document.getElementById("ar-container"),
          imageTargetSrc: targetUrl,
          maxTrack: 1,
          uiLoading: "no",
          uiScanning: "no",
          uiError: "no",
        });
        const { renderer, scene, camera } = mindar;
        log("mindar instance ok");

        // Load hero texture once
        const heroLoader = new THREE.TextureLoader();
        const heroTex = await new Promise((res, rej) => {
          heroLoader.load(HERO_IMG, res, undefined, rej);
        });
        log(`hero loaded ${heroTex.image.naturalWidth}x${heroTex.image.naturalHeight}`);

        const heroAspect = heroTex.image.naturalWidth / heroTex.image.naturalHeight;
        const heroH = 0.85;
        const heroW = heroH * heroAspect;

        // 3 anchors, each with diag box + hero plane + hearts
        const anchors = [];
        for (let i = 0; i < 3; i++) {
          const anchor = mindar.addAnchor(i);

          // Diag box (large, opaque) — 보이는지 확인용
          const boxGeo = new THREE.BoxGeometry(0.4, 0.4, 0.04);
          const boxMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(TARGET_COLORS[i]) });
          const box = new THREE.Mesh(boxGeo, boxMat);
          box.position.set(0, 0, 0.1);
          anchor.group.add(box);

          // Hero plane
          const planeGeo = new THREE.PlaneGeometry(heroW, heroH);
          const planeMat = new THREE.MeshBasicMaterial({ map: heroTex, transparent: true });
          const plane = new THREE.Mesh(planeGeo, planeMat);
          plane.position.set(0, 0.55, 0.05);
          anchor.group.add(plane);

          // Color hearts ring (simple Sprite-like text not supported in plain three.js easy → use small colored boxes)
          const heartColor = new THREE.Color(TARGET_COLORS[i]);
          const heartGeo = new THREE.SphereGeometry(0.04, 12, 12);
          const heartMat = new THREE.MeshBasicMaterial({ color: heartColor });
          const count = 8;
          for (let h = 0; h < count; h++) {
            const angle = (h / count) * Math.PI * 2;
            const r = 0.45;
            const heart = new THREE.Mesh(heartGeo, heartMat);
            heart.position.set(Math.cos(angle) * r, Math.sin(angle) * 0.25 - 0.1, 0.06);
            anchor.group.add(heart);
          }

          anchor.onTargetFound = () => {
            log(`target ${i} found`);
            document.getElementById("hint-overlay").style.display = "none";
          };
          anchor.onTargetLost = () => {
            log(`target ${i} lost`);
            document.getElementById("hint-overlay").style.display = "block";
          };
          anchors.push(anchor);
        }
        log(`${anchors.length} anchors with content created`);

        setLoadingMsg("카메라 시작 중…");
        log("calling mindar.start()");
        await mindar.start();
        log("mindar.start() resolved");

        document.getElementById("loading").style.display = "none";
        document.getElementById("hint-overlay").style.display = "block";

        renderer.setAnimationLoop(() => renderer.render(scene, camera));
        log("render loop running");
      } catch (e) {
        log(`[catch] ${e.message || e}`);
        showErr(e);
      }
    });
  </script>
</body>
</html>
